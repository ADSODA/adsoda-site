<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Organic Honey Cake | Handmade Medovik in Clearwater · St. Pete · Tampa Bay</title>
  <meta name="description" content="Handmade Russian honey cake — Medovik — made to order in Clearwater, St. Pete and Tampa Bay." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=EB+Garamond:wght@400&display=swap" rel="stylesheet">

  <style>
    :root{
      --black:#080810;
      --ivory:#FFF8E7;
      --ivory2:rgba(255,248,231,.78);
      --gold:#D4A017;
      --gold2:#C9A84C;
      --red:#8B0000;
      --red2:#C0392B;
      --ease:cubic-bezier(0.25,0,0,1);
      --max:1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--ivory);
      background:
        radial-gradient(circle at 15% 20%, rgba(192,57,43,.18), transparent 28rem),
        radial-gradient(circle at 85% 8%, rgba(212,160,23,.12), transparent 24rem),
        var(--black);
      font-family:"EB Garamond", Georgia, serif;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      padding:16px 18px;
      display:flex;
      justify-content:center;
      background:linear-gradient(to bottom, rgba(8,8,16,.86), rgba(8,8,16,0));
      backdrop-filter: blur(8px);
    }

    .nav-inner{
      width:min(var(--max),100%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .brand{
      font-family:"Cormorant Garamond",serif;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:15px;
      color:var(--gold);
      white-space:nowrap;
    }

    .lang{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .lang button{
      border:1px solid rgba(212,160,23,.28);
      background:rgba(255,248,231,.04);
      color:var(--ivory2);
      font-family:"EB Garamond",serif;
      border-radius:999px;
      padding:7px 10px;
      cursor:pointer;
      transition:.55s var(--ease);
    }

    .lang button.active,
    .lang button:hover{
      color:var(--ivory);
      border-color:rgba(212,160,23,.85);
      background:rgba(139,0,0,.32);
    }

    .hero{
      min-height:100svh;
      display:grid;
      place-items:center;
      position:relative;
      padding:96px 18px 54px;
      overflow:hidden;
      isolation:isolate;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 15% 22%, rgba(255,248,231,.35) 0 3px, transparent 5px),
        radial-gradient(circle at 82% 18%, rgba(212,160,23,.38) 0 4px, transparent 7px),
        radial-gradient(circle at 74% 72%, rgba(192,57,43,.28) 0 5px, transparent 9px),
        radial-gradient(circle at 50% 45%, rgba(212,160,23,.18), transparent 34rem);
      opacity:.72;
      animation:breathe 9s var(--ease) infinite alternate;
      z-index:-2;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 0 28%, rgba(8,8,16,.42) 61%, rgba(8,8,16,.96) 100%);
      z-index:-1;
    }

    @keyframes breathe{
      from{transform:scale(1);opacity:.55}
      to{transform:scale(1.05);opacity:.9}
    }

    .hero-grid{
      width:min(var(--max),100%);
      display:grid;
      grid-template-columns:1fr;
      gap:24px;
      text-align:center;
      align-items:center;
    }

    .hero-copy{order:2}

    .eyebrow{
      letter-spacing:.22em;
      text-transform:uppercase;
      font-size:12px;
      color:var(--ivory2);
      margin:0 0 16px;
    }

    h1,h2,h3{
      font-family:"Cormorant Garamond", Georgia, serif;
      font-weight:300;
      line-height:.95;
      margin:0;
    }

    h1{
      color:var(--gold);
      font-size:clamp(47px, 13vw, 118px);
      text-shadow:0 0 32px rgba(212,160,23,.25);
      letter-spacing:-.035em;
    }

    h2{
      color:var(--gold);
      font-size:clamp(39px, 9vw, 78px);
      letter-spacing:-.025em;
    }

    h3{
      color:var(--gold);
      font-size:31px;
    }
    .lead{
      max-width:650px;
      margin:22px auto 0;
      font-size:clamp(19px, 4.6vw, 25px);
      color:var(--ivory2);
      line-height:1.42;
    }

    .rus{
      margin:18px auto 0;
      color:rgba(255,248,231,.7);
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
    }

    .cta-row{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:30px;
    }

    .btn{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(212,160,23,.75);
      padding:15px 22px;
      border-radius:999px;
      font-family:"Cormorant Garamond",serif;
      font-size:18px;
      letter-spacing:.13em;
      text-transform:uppercase;
      transition:transform .7s var(--ease),
                 background .7s var(--ease),
                 box-shadow .7s var(--ease);
    }

    .btn.red{
      background:linear-gradient(135deg, var(--red), var(--red2));
      box-shadow:0 20px 45px rgba(139,0,0,.28);
    }

    .btn.gold{
      background:rgba(212,160,23,.06);
      color:var(--gold);
    }

    .btn::after{
      content:"";
      position:absolute;
      top:-60%;
      left:-30%;
      width:50%;
      height:220%;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
      );
      transform:rotate(28deg) translateX(-150%);
      transition:1s var(--ease);
    }

    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 25px 60px rgba(212,160,23,.16);
    }

    .btn:hover::after{
      transform:rotate(28deg) translateX(420%);
    }

    .cake-stage{
      order:1;
      position:relative;
      width:min(88vw,520px);
      margin:0 auto;
    }

    .cake-stage::before{
      content:"";
      position:absolute;
      inset:6%;
      border-radius:50%;
      background:
        radial-gradient(
          circle,
          rgba(212,160,23,.56),
          rgba(192,57,43,.16) 38%,
          transparent 68%
        );
      filter:blur(28px);
      animation:candle 5.8s var(--ease) infinite alternate;
    }

    @keyframes candle{
      from{
        opacity:.55;
        transform:scale(.95);
      }
      to{
        opacity:.95;
        transform:scale(1.05);
      }
    }

    #cake-photo{
      position:relative;
      border-radius:50%;
      aspect-ratio:1/1;
      object-fit:cover;
      box-shadow:
        0 28px 90px rgba(0,0,0,.68),
        0 0 0 1px rgba(212,160,23,.23),
        inset 0 0 40px rgba(212,160,23,.12);
      transform:translateY(6px);
    }

    section{
      position:relative;
      padding:84px 18px;
      overflow:hidden;
    }

    .wrap{
      width:min(var(--max),100%);
      margin:auto;
      position:relative;
      z-index:1;
    }

    .split{
      display:grid;
      grid-template-columns:1fr;
      gap:34px;
      align-items:center;
    }

    .photo-frame{
      padding:10px;
      border:1px solid rgba(212,160,23,.28);
      border-radius:28px;
      background:
        linear-gradient(
          145deg,
          rgba(255,248,231,.06),
          rgba(139,0,0,.06)
        );
      box-shadow:0 30px 80px rgba(0,0,0,.38);
    }

    .photo-frame img{
      border-radius:20px;
      aspect-ratio:4/5;
      object-fit:cover;
      width:100%;
    }

    .copy p{
      font-size:21px;
      line-height:1.58;
      color:var(--ivory2);
    }

    .badges{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:26px;
    }

    .badge,
    .card{
      border:1px solid rgba(212,160,23,.23);
      background:rgba(255,248,231,.035);
      border-radius:22px;
      padding:20px;
      box-shadow:
        inset 0 0 22px rgba(212,160,23,.025);
    }

    .badge{
      color:var(--gold);
      font-family:"Cormorant Garamond",serif;
      font-size:21px;
    }

    .story{
      background:
        radial-gradient(
          circle at 50% 30%,
          rgba(212,160,23,.17),
          transparent 32rem
        ),
        linear-gradient(
          180deg,
          rgba(139,0,0,.08),
          rgba(8,8,16,0)
        );

      text-align:center;
    }

    .story p{
      max-width:760px;
      margin:24px auto 0;
      font-size:23px;
      line-height:1.55;
      color:var(--ivory2);
    }

    .quote{
      margin:36px auto 0;
      max-width:850px;
      font-family:"Cormorant Garamond",serif;
      font-style:italic;
      font-weight:600;
      color:var(--gold);
      font-size:clamp(32px,7vw,62px);
      line-height:1.05;
    }
